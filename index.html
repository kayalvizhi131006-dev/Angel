<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kayalvizhi | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .profile {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      margin-bottom: 15px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    header {
      text-align: center;
      padding: 60px 20px;
    }

    header h1 {
      font-size: 40px;
    }

    header p {
      opacity: 0.8;
      margin-top: 10px;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      margin: 20px 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 15px;
    }

    ul {
      list-style: none;
    }

    ul li {
      padding: 8px 0;
    }

    .projects div {
      margin-bottom: 10px;
    }

    a {
      color: #ffd369;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <img src="profile.jpeg" alt="Kayalvizhi" class="profile">
  <h1>Kayalvizhi</h1>
  <p>Frontend Developer | UI/UX Designer</p>
</header>

<div class="container">

  <div class="card">
    <h2>About Me</h2>
    <p>I am a BCA student passionate about frontend development and UI/UX design.</p>
  </div>

</div>

<footer>
  <p>© 2026 Kayalvizhi</p>
</footer>

</body>
</html>
